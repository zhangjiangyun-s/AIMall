global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: aimall-server
    metrics_path: /actuator/prometheus
    authorization:
      credentials_file: /run/secrets/observability_token
    static_configs:
      - targets: ["aimall-server:8080"]

  - job_name: aimall-ai-service
    metrics_path: /observability/prometheus
    authorization:
      credentials_file: /run/secrets/observability_token
    static_configs:
      - targets: ["aimall-ai-service:8000"]
