name: stage22-security

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Deployed sandbox URL for OWASP ZAP
        required: true
        type: string
      server_image:
        description: Immutable AIMall server image reference
        required: true
        type: string
      ai_image:
        description: Immutable AIMall AI image reference
        required: true
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  source-and-dependencies:
    runs-on: ubuntu-latest
    concurrency:
      group: aimall-nvd-dependency-check
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: "17", cache: maven}
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          cache-dependency-path: |
            aimall-web/package-lock.json
            aimall-admin/package-lock.json
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Resolve Dependency-Check cache key
        id: dependency-check-cache-key
        shell: bash
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"
      - name: Restore Dependency-Check vulnerability data
        id: dependency-check-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-${{ runner.os }}-12.2.2-${{ steps.dependency-check-cache-key.outputs.week }}
          restore-keys: |
            dependency-check-${{ runner.os }}-12.2.2-
      - name: SAST - Semgrep OWASP Top Ten
        run: pip install semgrep && semgrep scan --config p/owasp-top-ten --error aimall-server/src/main aimall-ai-service/app aimall-web/src aimall-admin/src
      - name: Update Dependency-Check vulnerability data
        working-directory: aimall-server
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY:-}" ]; then
            echo "::warning::NVD_API_KEY is unavailable; Dependency-Check will use the rate-limited NVD API."
            nvd_delay_ms=10000
          else
            nvd_delay_ms=6000
          fi

          for attempt in 1 2 3; do
            if mvn -B org.owasp:dependency-check-maven:12.2.2:update-only \
              -DnvdApiDelay="${nvd_delay_ms}"; then
              exit 0
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "::error::Unable to update Dependency-Check data after ${attempt} attempts."
              exit 1
            fi

            backoff_seconds=$((attempt * 60))
            echo "::warning::Dependency-Check data update attempt ${attempt} failed; retrying in ${backoff_seconds}s."
            sleep "${backoff_seconds}"
          done
      - name: Save Dependency-Check vulnerability data
        if: steps.dependency-check-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-${{ runner.os }}-12.2.2-${{ steps.dependency-check-cache-key.outputs.week }}
      - name: Maven dependency CVSS gate
        working-directory: aimall-server
        run: mvn -B org.owasp:dependency-check-maven:12.2.2:check -DautoUpdate=false
      - name: npm dependency gates
        run: npm --prefix aimall-web ci --include=dev --no-audit && npm --prefix aimall-web audit --audit-level=high && npm --prefix aimall-admin ci --include=dev --no-audit && npm --prefix aimall-admin audit --audit-level=high
      - name: pip dependency gate
        working-directory: aimall-ai-service
        run: pip install pip-audit && pip-audit -r requirements.txt
      - name: Secret scan - full history and worktree
        uses: gitleaks/gitleaks-action@v2
      - name: IaC and Compose scan
        run: pip install checkov && checkov -d . --framework dockerfile,docker_compose,github_actions --hard-fail-on HIGH

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: aquasecurity/trivy-action@0.28.0
        with: {image-ref: "${{ inputs.server_image }}", severity: "HIGH,CRITICAL", exit-code: "1", ignore-unfixed: false}
      - uses: aquasecurity/trivy-action@0.28.0
        with: {image-ref: "${{ inputs.ai_image }}", severity: "HIGH,CRITICAL", exit-code: "1", ignore-unfixed: false}

  dast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP ZAP baseline against sandbox
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "${{ inputs.target_url }}"
          fail_action: true
