name: stage22-security

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Deployed sandbox URL for OWASP ZAP
        required: true
        type: string
      server_image:
        description: Immutable AIMall server image reference
        required: true
        type: string
      ai_image:
        description: Immutable AIMall AI image reference
        required: true
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  source-and-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: "17", cache: maven}
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          cache-dependency-path: |
            aimall-web/package-lock.json
            aimall-admin/package-lock.json
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: SAST - Semgrep OWASP Top Ten
        run: pip install semgrep && semgrep scan --config p/owasp-top-ten --error aimall-server/src/main aimall-ai-service/app aimall-web/src aimall-admin/src
      - name: Maven dependency CVSS gate
        working-directory: aimall-server
        run: mvn -B org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7
      - name: npm dependency gates
        run: npm --prefix aimall-web ci --include=dev --no-audit && npm --prefix aimall-web audit --audit-level=high && npm --prefix aimall-admin ci --include=dev --no-audit && npm --prefix aimall-admin audit --audit-level=high
      - name: pip dependency gate
        working-directory: aimall-ai-service
        run: pip install pip-audit && pip-audit -r requirements.txt
      - name: Secret scan - full history and worktree
        uses: gitleaks/gitleaks-action@v2
      - name: IaC and Compose scan
        run: pip install checkov && checkov -d . --framework dockerfile,docker_compose,github_actions --hard-fail-on HIGH

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: aquasecurity/trivy-action@0.28.0
        with: {image-ref: "${{ inputs.server_image }}", severity: "HIGH,CRITICAL", exit-code: "1", ignore-unfixed: false}
      - uses: aquasecurity/trivy-action@0.28.0
        with: {image-ref: "${{ inputs.ai_image }}", severity: "HIGH,CRITICAL", exit-code: "1", ignore-unfixed: false}

  dast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP ZAP baseline against sandbox
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "${{ inputs.target_url }}"
          fail_action: true
