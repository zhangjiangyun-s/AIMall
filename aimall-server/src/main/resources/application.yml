server:
  port: 8080

spring:
  application:
    name: aimall-server

# Sa-Token 配置（已引入，本轮接口不开启拦截）
sa-token:
  token-name: token
  timeout: 2592000
  is-print: false
  # 关闭所有路由拦截，本轮全部接口公开
  is-intercept: false

# Knife4j 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh-CN
