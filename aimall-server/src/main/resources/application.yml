server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: aimall-server
  mvc:
    async:
      request-timeout: 180000
  datasource:
    url: ${AIMALL_DB_URL:jdbc:mysql://127.0.0.1:3306/aimall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${AIMALL_DB_USERNAME:}
    password: ${AIMALL_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${AIMALL_DB_POOL_MAX_SIZE:50}
      minimum-idle: ${AIMALL_DB_POOL_MIN_IDLE:10}
      connection-timeout: ${AIMALL_DB_POOL_CONNECTION_TIMEOUT_MS:3000}
      validation-timeout: ${AIMALL_DB_POOL_VALIDATION_TIMEOUT_MS:1000}
  mail:
    host: ${AIMALL_SMTP_HOST:127.0.0.1}
    port: ${AIMALL_SMTP_PORT:1025}
    username: ${AIMALL_SMTP_USERNAME:}
    password: ${AIMALL_SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${AIMALL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${AIMALL_SMTP_STARTTLS:false}
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 10000
      mail.smtp.writetimeout: 10000
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 200MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 20260716
    locations: classpath:db/migration
    validate-on-migrate: true

sa-token:
  token-name: token
  is-read-cookie: false
  timeout: 2592000
  is-print: false
  is-intercept: true

ai-service:
  base-url: ${AIMALL_AI_SERVICE_BASE_URL:http://localhost:8000}

aimall:
  environment: ${AIMALL_ENVIRONMENT:local}
  tenant:
    mode: ${AIMALL_TENANT_MODE:SINGLE_TENANT}
    default-id: ${AIMALL_DEFAULT_TENANT_ID:default}
  payment:
    simulation-enabled: ${AIMALL_PAYMENT_SIMULATION_ENABLED:false}
    provider: ${AIMALL_PAYMENT_PROVIDER:SIMULATE}
    alipay:
      enabled: ${ALIPAY_ENABLED:false}
      app-id: ${ALIPAY_APP_ID:}
      seller-id: ${ALIPAY_SELLER_ID:}
      private-key-file: ${ALIPAY_PRIVATE_KEY_FILE:}
      public-key-file: ${ALIPAY_PUBLIC_KEY_FILE:}
      gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      notify-base-url: ${ALIPAY_NOTIFY_BASE_URL:}
      return-url: ${ALIPAY_RETURN_URL:}
      sign-type: ${ALIPAY_SIGN_TYPE:RSA2}
      charset: ${ALIPAY_CHARSET:UTF-8}
      format: ${ALIPAY_FORMAT:json}
  security:
    trusted-proxy-cidrs: ${AIMALL_TRUSTED_PROXY_CIDRS:127.0.0.1/32,::1/128}
    allowed-origins: ${AIMALL_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
    upload:
      antivirus:
        enabled: ${AIMALL_UPLOAD_ANTIVIRUS_ENABLED:false}
        required: ${AIMALL_UPLOAD_ANTIVIRUS_REQUIRED:false}
        host: ${AIMALL_UPLOAD_ANTIVIRUS_HOST:127.0.0.1}
        port: ${AIMALL_UPLOAD_ANTIVIRUS_PORT:3310}
  internal-api:
    secret: ${AIMALL_INTERNAL_API_SECRET:}
    java-to-ai:
      key-id: ${AIMALL_JAVA_TO_AI_KEY_ID:legacy}
      secret: ${AIMALL_JAVA_TO_AI_SECRET:${AIMALL_INTERNAL_API_SECRET:}}
    ai-to-java:
      current-key-id: ${AIMALL_AI_TO_JAVA_KEY_ID:legacy}
      current-secret: ${AIMALL_AI_TO_JAVA_SECRET:${AIMALL_INTERNAL_API_SECRET:}}
      previous-key-id: ${AIMALL_AI_TO_JAVA_PREVIOUS_KEY_ID:}
      previous-secret: ${AIMALL_AI_TO_JAVA_PREVIOUS_SECRET:}
  email:
    enabled: ${AIMALL_EMAIL_ENABLED:true}
    from: ${AIMALL_EMAIL_FROM:AIMall <no-reply@aimall.local>}
    code-pepper: ${AIMALL_EMAIL_CODE_PEPPER:aimall-local-mailhog-pepper-not-for-production}
    code-ttl-minutes: ${AIMALL_EMAIL_CODE_TTL_MINUTES:10}
    send-cooldown-seconds: ${AIMALL_EMAIL_SEND_COOLDOWN_SECONDS:60}
    max-attempts: ${AIMALL_EMAIL_CODE_MAX_ATTEMPTS:5}
  observability:
    token: ${AIMALL_OBSERVABILITY_TOKEN:}
    refresh-ms: ${AIMALL_OBSERVABILITY_REFRESH_MS:30000}
    audit-retention-days: ${AIMALL_AUDIT_RETENTION_DAYS:180}
    cleanup-cron: ${AIMALL_OBSERVABILITY_CLEANUP_CRON:0 40 3 * * *}

management:
  endpoints:
    web:
      exposure:
        include: prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${aimall.environment}
    distribution:
      percentiles:
        http.server.requests: 0.5,0.95,0.99
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,300ms,1s,3s,10s

springdoc:
  api-docs:
    enabled: ${AIMALL_API_DOCS_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
